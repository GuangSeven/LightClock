name: Windows Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - copilot/**
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            platform: x64
          - rid: win-x86
            platform: x86
          - rid: win-arm64
            platform: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore (${{ matrix.rid }})
        run: dotnet restore .\LightClock\LightClock.csproj -r ${{ matrix.rid }}

      - name: Build (Release ${{ matrix.rid }})
        run: dotnet build .\LightClock\LightClock.csproj -c Release -r ${{ matrix.rid }} -p:Platform=${{ matrix.platform }} --no-restore

      - name: Publish self-contained (${{ matrix.rid }})
        run: >
          dotnet publish .\LightClock\LightClock.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:Platform=${{ matrix.platform }}
          -o .\publish-${{ matrix.rid }}
          --no-build

      - name: Upload publish artifact (${{ matrix.rid }})
        uses: actions/upload-artifact@v4
        with:
          name: LightClock-${{ matrix.rid }}
          path: .\publish-${{ matrix.rid }}\**

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: .\artifacts

      - name: Compress each artifact
        shell: pwsh
        run: |
          Get-ChildItem -Path .\artifacts -Directory | ForEach-Object {
            $zip = ".\$($_.Name).zip"
            Compress-Archive -Path $_.FullName\* -DestinationPath $zip
          }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: LightClock-win-*.zip
