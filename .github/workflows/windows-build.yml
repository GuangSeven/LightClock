name: Windows Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - copilot/**
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            platform: x64
          - rid: win-x86
            platform: x86
          - rid: win-arm64
            platform: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore (${{ matrix.rid }})
        run: dotnet restore .\LightClock\LightClock.csproj -r ${{ matrix.rid }}

      - name: Publish framework-dependent (${{ matrix.rid }})
        # Framework-dependent build: the artifact is ~200 KB (just LightClock.dll/exe + Assets/).
        # Users must install the .NET 8 Desktop Runtime separately from
        # https://dotnet.microsoft.com/download/dotnet/8.0
        #
        # We use --self-contained false so the .NET runtime is NOT bundled.
        # The -r flag is still needed to produce the correct native apphost (LightClock.exe)
        # for each architecture (x64/x86/arm64). The .dll and .runtimeconfig.json are
        # identical across architectures.
        #
        # IMPORTANT: do NOT pass --no-build here. The .NET SDK generates the runtimeconfig.json
        # differently for `build` vs `publish`. Letting publish run its own build step ensures
        # the runtimeconfig.json is generated correctly.
        run: >
          dotnet publish .\LightClock\LightClock.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained false
          -p:Platform=${{ matrix.platform }}
          -o .\publish-${{ matrix.rid }}

      - name: Upload publish artifact (${{ matrix.rid }})
        uses: actions/upload-artifact@v7
        with:
          name: LightClock-${{ matrix.rid }}
          path: .\publish-${{ matrix.rid }}\**

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: .\artifacts

      - name: Compress each artifact
        shell: pwsh
        run: |
          Get-ChildItem -Path .\artifacts -Directory | ForEach-Object {
            $zip = ".\$($_.Name).zip"
            Compress-Archive -Path $_.FullName\* -DestinationPath $zip
          }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: LightClock-win-*.zip
          body: |
            ## Requirements

            Install the **.NET 8 Desktop Runtime** from https://dotnet.microsoft.com/download/dotnet/8.0
            (pick the "Desktop Runtime" matching your Windows architecture: x64 / x86 / arm64).

            ## Download

            Pick the zip matching your Windows architecture:
            - `LightClock-win-x64.zip` — Intel/AMD 64-bit (most users)
            - `LightClock-win-x86.zip` — 32-bit Windows
            - `LightClock-win-arm64.zip` — Surface Pro X / Snapdragon laptops

            Unzip and double-click `LightClock.exe`.
