name: Windows Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - copilot/**
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            platform: x64
          - rid: win-x86
            platform: x86
          - rid: win-arm64
            platform: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore (${{ matrix.rid }})
        run: dotnet restore .\LightClock\LightClock.csproj -r ${{ matrix.rid }}

      - name: Publish self-contained (${{ matrix.rid }})
        # IMPORTANT: do NOT pass --no-build here.
        #
        # The .NET SDK generates the runtimeconfig.json differently for `build` vs `publish`:
        #   - `dotnet build` produces a framework-dependent runtimeconfig.json that references
        #     "framework": { "name": "Microsoft.NETCore.App", "version": "8.0.0" }.
        #   - `dotnet publish --self-contained` produces a self-contained runtimeconfig.json
        #     with "includedFrameworks": [{ "name": "Microsoft.NETCore.App", "version": "8.0.28" }]
        #     and includes coreclr.dll / System.Private.CoreLib.dll in the output.
        #
        # If publish is run with --no-build, it SKIPS the runtimeconfig.json regeneration
        # step and just copies the framework-dependent version produced by `build`. The
        # resulting artifact then has coreclr.dll bundled (so it LOOKS self-contained) but
        # the runtimeconfig.json still declares a global framework reference to
        # Microsoft.NETCore.App 8.0.0 — which causes hostfx to fail with the misleading
        # "You must install or update .NET to run this application" error on machines that
        # don't have the .NET 8 runtime installed.
        #
        # Letting publish run its own build step ensures the runtimeconfig.json is
        # regenerated correctly for the self-contained scenario.
        run: >
          dotnet publish .\LightClock\LightClock.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:Platform=${{ matrix.platform }}
          -o .\publish-${{ matrix.rid }}

      - name: Upload publish artifact (${{ matrix.rid }})
        uses: actions/upload-artifact@v7
        with:
          name: LightClock-${{ matrix.rid }}
          path: .\publish-${{ matrix.rid }}\**

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: .\artifacts

      - name: Compress each artifact
        shell: pwsh
        run: |
          Get-ChildItem -Path .\artifacts -Directory | ForEach-Object {
            $zip = ".\$($_.Name).zip"
            Compress-Archive -Path $_.FullName\* -DestinationPath $zip
          }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: LightClock-win-*.zip
