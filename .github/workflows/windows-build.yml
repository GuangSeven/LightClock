name: Windows Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - copilot/**
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\LightClock\LightClock.csproj -r win-x64

      - name: Build (Release x64)
        run: dotnet build .\LightClock\LightClock.csproj -c Release -r win-x64 -p:Platform=x64 --no-restore

      - name: Publish self-contained (win-x64)
        run: >
          dotnet publish .\LightClock\LightClock.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:Platform=x64
          -o .\publish
          --no-build

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: LightClock-win-x64
          path: .\publish\**

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: LightClock-win-x64
          path: .\publish

      - name: Compress publish output
        run: Compress-Archive -Path .\publish\* -DestinationPath .\LightClock-win-x64.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: LightClock-win-x64.zip
